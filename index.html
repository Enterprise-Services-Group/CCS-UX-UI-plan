<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCS UX/UI Delivery Plan — June to November 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-main">
      <div class="header-title">
        <h1>CCS UX/UI Delivery Plan</h1>
        <p class="subtitle">June to November 2026 &middot; UX/UI, SME Content &amp; Development delivery</p>
      </div>
      <div class="header-actions">
        <button id="btn-compact" class="ghost-btn" title="Toggle compact / detailed view">Compact view</button>
        <button id="btn-print" class="ghost-btn" title="Print-friendly view">Print</button>
        <button id="btn-csv" class="ghost-btn" title="Export tasks to CSV">Export CSV</button>
        <button id="btn-reset" class="ghost-btn" title="Reset saved status changes">Reset status</button>
      </div>
    </div>

    <!-- Progress dashboard -->
    <section id="dashboard" class="dashboard" aria-label="Progress dashboard"></section>

    <!-- View switcher -->
    <nav class="view-switcher" aria-label="Views">
      <button class="view-tab active" data-view="timeline">Timeline</button>
      <button class="view-tab" data-view="swimlanes">Role Swimlanes</button>
      <button class="view-tab" data-view="epics">Epics</button>
      <button class="view-tab" data-view="dependencies">Dependencies</button>
      <button class="view-tab" data-view="deliverables">Deliverables</button>
      <button class="view-tab" data-view="jira">Jira Export</button>
    </nav>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="filter-group">
        <label for="filter-search">Search</label>
        <input type="search" id="filter-search" placeholder="Search tasks, deliverables…" />
      </div>
      <div class="filter-group">
        <label for="filter-role">Role</label>
        <select id="filter-role">
          <option value="all">All roles</option>
          <option value="ux">UX/UI</option>
          <option value="sme">Collection Access SME (Alli)</option>
          <option value="dev">Development Team</option>
          <option value="gov">Shared Governance</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-month">Month</label>
        <select id="filter-month">
          <option value="all">All months</option>
          <option value="June">June</option>
          <option value="July">July</option>
          <option value="August">August</option>
          <option value="September">September</option>
          <option value="October">October</option>
          <option value="November">November</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-epic">Epic</label>
        <select id="filter-epic">
          <option value="all">All epics</option>
        </select>
      </div>
      <div class="filter-group status-toggles" role="group" aria-label="Status visibility">
        <label class="status-check"><input type="checkbox" data-status="not-started" checked /> Not started</label>
        <label class="status-check"><input type="checkbox" data-status="in-progress" checked /> In progress</label>
        <label class="status-check"><input type="checkbox" data-status="complete" checked /> Complete</label>
      </div>
    </div>
  </header>

  <main id="view-root" class="view-root" aria-live="polite"></main>

  <!-- Task detail panel -->
  <div id="overlay" class="overlay hidden"></div>
  <aside id="detail-panel" class="detail-panel hidden" aria-label="Task detail" role="dialog" aria-modal="true">
    <button id="detail-close" class="detail-close" aria-label="Close detail panel">&times;</button>
    <div id="detail-content"></div>
  </aside>

  <footer class="app-footer">
    <span>CCS UX/UI Delivery Plan &middot; Planning, stakeholder alignment &amp; Jira backlog preparation</span>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
