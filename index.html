<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCS Delivery Planner V2 — 2026 Internal MVP → 2027 Public Launch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-main">
      <div class="header-title">
        <h1>CCS Delivery Planner <span class="v2-badge">V2</span></h1>
        <p class="subtitle">2026 Internal MVP &nbsp;→&nbsp; 2027 Public Launch</p>
      </div>
      <div class="header-actions">
        <button id="btn-mode" class="ghost-btn" title="Switch between executive and detailed views">Detailed mode</button>
        <button id="btn-edit" class="ghost-btn edit-btn" title="Turn editing on to add, edit or delete epics and tasks">✎ Edit / Add</button>
        <button id="btn-print" class="ghost-btn" title="Print-friendly view">Print</button>
        <button id="btn-csv" class="ghost-btn" title="Export tasks to CSV">Export CSV</button>
        <button id="btn-save-plan" class="ghost-btn" title="Save the edited plan to a JSON file">Save plan</button>
        <button id="btn-load-plan" class="ghost-btn" title="Load a previously saved plan JSON">Load plan</button>
        <button id="btn-reset" class="ghost-btn" title="Reset all saved changes">Reset</button>
        <input type="file" id="file-load-plan" accept="application/json,.json" style="display:none" />
      </div>
    </div>

    <!-- Section switcher -->
    <nav class="view-switcher" aria-label="Sections">
      <button class="view-tab active" data-view="summary">Executive Summary</button>
      <button class="view-tab" data-view="mvp2026">2026 Internal MVP</button>
      <button class="view-tab" data-view="public2027">2027 Public Launch</button>
      <button class="view-tab" data-view="dependencies">Dependencies</button>
      <button class="view-tab" data-view="artefacts">Artefacts</button>
      <button class="view-tab" data-view="jira">Jira Export</button>
    </nav>

    <!-- Filter bar (hidden on the summary view) -->
    <div class="filter-bar" id="filter-bar">
      <div class="filter-group">
        <label for="filter-search">Search</label>
        <input type="search" id="filter-search" placeholder="Search tasks, deliverables…" />
      </div>
      <div class="filter-group">
        <label for="filter-role">Role</label>
        <select id="filter-role">
          <option value="all">All workstreams</option>
          <option value="ux">UX/UI</option>
          <option value="sme">Collection Access SME (Alli)</option>
          <option value="dev">Development Team</option>
          <option value="gov">Governance</option>
        </select>
      </div>
      <div class="filter-group status-toggles" role="group" aria-label="Status visibility">
        <label class="status-check"><input type="checkbox" data-status="not-started" checked /> Not started</label>
        <label class="status-check"><input type="checkbox" data-status="in-progress" checked /> In progress</label>
        <label class="status-check"><input type="checkbox" data-status="complete" checked /> Complete</label>
      </div>
    </div>
  </header>

  <main id="view-root" class="view-root" aria-live="polite"></main>

  <!-- Task detail panel -->
  <div id="overlay" class="overlay hidden"></div>
  <aside id="detail-panel" class="detail-panel hidden" aria-label="Task detail" role="dialog" aria-modal="true">
    <button id="detail-close" class="detail-close" aria-label="Close detail panel">&times;</button>
    <div id="detail-content"></div>
  </aside>

  <footer class="app-footer">
    <span>CCS Delivery Planner V2 &middot; Two distinct delivery phases connected by a successful internal MVP</span>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
